name: TDR Run Consignment Export Tests
on:
  pull_request:
  push:
    branches-ignore:
      - master
      - release-*
permissions: {}
jobs:
  test:
    permissions:
      id-token: write
      contents: write
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@e3622e3bbb9019981b3aaf6b278b2fce0c7d812b # v.0.0.40
    with:
      repo-name: tdr-consignment-export
      test-command: |
        docker build -f Dockerfile-tests -t tests .
        sbt test
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
